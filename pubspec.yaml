name: meal_plan
description: A health and nutrition tracking application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  device_info_plus: ^10.1.0

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.2
  file_picker: ^8.0.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Animations
  lottie: ^3.1.0

  # Date & formatting (FIX FOR YOUR ERROR)
  intl: ^0.19.0

  #Export pdf
  pdf: ^3.10.7
  printing: ^5.12.0

 # Payments & charts
  razorpay_flutter: ^1.3.7
  fl_chart: ^0.68.0

  # State & storage
  provider: ^6.1.2
  shared_preferences: ^2.3.0

  # UI & icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1

  # HTTP & APIs
  http: ^1.2.2
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/google_logo.png
    - assets/images/meal_header.png
    - assets/images/hero-food.jpg
    - assets/images/forgot.png
    - assets/images/otp.png
    - assets/images/dark_wave.png
    - assets/images/light_wave.png
    - assets/images/blue_dark_wave.png
    - assets/images/blue_light_wave.png
    - assets/images/water_drop.png
    - assets/images/vector1.png
    - assets/images/vector2.png
    - assets/images/small_water_drop.png
#   - assets/images/new_password.png
    - assets/images/download.png
    - assets/images/sun.png
    - assets/images/workout_header.png
    - assets/lottie/Drinking.json
    - assets/lottie/glass_water.json

  fonts:
    - family: RobotoSlab
      fonts:
        - asset: assets/fonts/RobotoSlab-Regular.ttf
        - asset: assets/fonts/RobotoSlab-Medium.ttf
        - asset: assets/fonts/RobotoSlab-SemiBold.ttf
        - asset: assets/fonts/RobotoSlab-Bold.ttf